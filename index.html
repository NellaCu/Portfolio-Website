<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>My Portfolio</title>
        <link rel="stylesheet" href="style.css" />
        <link rel="stylesheet" href="mediaqueries.css" />
    </head>
    <body>
        <nav id="desktop-nav">
            <div class="logo">Allen Cui</div>
            <div>
                <ul class="nav-links">
                    <li><a href="#about">About</a></li>
                    <li><a href="#experience">Experience</a></li>
                    <li><a href="#projects">Project</a></li>
                    <li><a href="#contact">Contact</a></li>
                </ul>
            </div>
        </nav>
        <nav id="hamburger-nav">
            <div class="logo">Allen Cui</div>
            <div class="hamburger-menu">
                <div class="hamburger-icon" onclick="toggleMenu()">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
                <div class="menu-links">
                    <li><a href="#about" onclick="toggleMenu()">About</a></li>
                    <li><a href="#experience"  onclick="toggleMenu()">Experience</a></li>
                    <li><a href="#projects"  onclick="toggleMenu()">Project</a></li>
                    <li><a href="#contact"  onclick="toggleMenu()">Contact</a></li>                    
                </div>
            </div>
        </nav>
        <section id="profile">
            <div class="section_pic-container">
                <img src='./assets/profile-pic.jpg' alt="Allen Cui pfp">
            </div>
            <div class="section_text">
                <p class="section_text_p1">Hi</p>
                <h1 class="title">Allen Cui</h1>
                <p class="section_text_p2">Full Stack Developer</p>
                <div class="btn-container">
                    <button class="btn btn-color-2" onclick="window.open('./assets/Allen-Cui-Resume.pdf')"
                    >Download Resume</button>
                    <button class="btn btn-color-2" onclick="location.href='./#contact'"
                    >Contact Info</button>
                </div>
                <div id="socials-container">
                    <img
                        src="./assets/linkedin.png"
                        alt="LinkedIn Profile"
                        class="icon"
                        onclick="location.href='https://www.linkedin.com/in/allcui/'"
                        />
                        <img
                        src="./assets/github.png"
                        alt="Github Profile"
                        class="icon"
                        onclick="location.href='https://github.com/NellaCu'"
                        />
                </div>
            </div>
        </section>
        <script src="script.js"></script>
    </body>
</html>
